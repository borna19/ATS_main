{% extends "base.html" %}
{% block content %}

<!-- PAGE HEADER -->
<div class="container mt-5 text-center">
    <h1 class="fw-bold mb-3">Contact Us</h1>
    <p class="text-muted fs-5">We’re here to help. Reach out to us for any queries or support.</p>
</div>

<!-- CONTACT SECTION -->
<div class="container mt-5 mb-5">
    <div class="row g-4">

        <!-- LEFT COLUMN – CONTACT FORM -->
        <div class="col-lg-6 col-md-12">
            <div class="card shadow p-5 card-hover" style="background: linear-gradient(135deg, #0d6efd, #6610f2); color: #fff;">
                <h3 class="mb-4 text-center">Send Us a Message</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label for="name" class="form-label">Your Name</label>
                        <input type="text" id="name" name="name" class="form-control" placeholder="Enter your name" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Your Email</label>
                        <input type="email" id="email" name="email" class="form-control" placeholder="Enter your email" required>
                    </div>
                    <div class="mb-3">
                        <label for="message" class="form-label">Your Message</label>
                        <textarea id="message" name="message" class="form-control" rows="5" placeholder="Write your message" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-light btn-lg w-100 fw-bold">Submit</button>
                </form>
            </div>
        </div>

        <!-- RIGHT COLUMN – GOOGLE MAP -->
        <div class="col-lg-6 col-md-12">
            <div class="card shadow card-hover h-100">
                <h3 class="p-3 text-center bg-primary text-white rounded-top">Our Location</h3>
                <div class="map-container" style="height: 100%; min-height: 400px;">
                    <iframe
                        src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3689.23412345678!2d88.3638953154378!3d22.57264648514529!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x39f882ab1cd2e0e1%3A0x1b2e4e1234567890!2sKolkata%2C%20West%20Bengal%2C%20India!5e0!3m2!1sen!2sin!4v1700000000000!5m2!1sen!2sin"
                        width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- STYLES -->
<style>
.card-hover {
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    border-radius: 12px;
}

.card-hover:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
}

.form-control {
    border-radius: 8px;
}

.btn-light {
    border-radius: 8px;
    font-weight: 600;
    color: #0d6efd;
}

.map-container iframe {
    border-radius: 0 0 12px 12px;
}

@media (max-width: 992px) {
    .map-container {
        min-height: 300px;
    }
}
</style>

<!-- Optional: FontAwesome for icons -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>

{% endblock %}
